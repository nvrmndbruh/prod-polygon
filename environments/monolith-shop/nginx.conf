upstream backend {
    server backend:5000;
}

server {
    listen 80;

    # перенаправляем логи в stdout/stderr чтобы docker logs их видел
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}