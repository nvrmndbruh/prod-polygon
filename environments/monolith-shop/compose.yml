services:
  workspace:
    build:
      context: .
      dockerfile: workspace.Dockerfile
    volumes:
      # Монтируем Docker socket чтобы пользователь мог
      # выполнять docker команды внутри контейнера
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - internal
    stdin_open: true
    tty: true
    # Контейнер остаётся живым пока не завершится сессия
    command: /bin/bash -c "while true; do sleep 1; done"

  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    depends_on:
      - backend
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=shop
      - DB_USER=shop
      - DB_PASSWORD=shop
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    networks:
      - internal

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
    networks:
      - internal

  redis:
    image: redis:7-alpine
    networks:
      - internal

networks:
  internal:
    driver: bridge